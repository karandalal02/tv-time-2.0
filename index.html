<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tally" />
  <title>Tally — TV Tracker</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-180.png" />
  <link rel="icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="app-header__inner">
        <h1 class="brand" id="brand">Tally</h1>
        <button class="icon-btn" id="settingsBtn" aria-label="Settings" title="Settings">⚙</button>
      </div>
    </header>

    <main id="view" class="view"></main>

    <nav class="tabbar" id="tabbar">
      <button class="tab" data-sec="tv"><span class="tab__icon">📺</span><span>TV</span></button>
      <button class="tab" data-sec="movies"><span class="tab__icon">🎬</span><span>Movies</span></button>
      <button class="tab" data-sec="search"><span class="tab__icon">⌕</span><span>Search</span></button>
      <button class="tab" data-sec="you"><span class="tab__icon">▧</span><span>You</span></button>
    </nav>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
